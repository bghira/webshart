name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  linux:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Ubuntu 22.04 (glibc 2.35)
          - os: ubuntu-22.04
            target: x86_64
            manylinux: manylinux_2_35
            python: '3.13'
          # Ubuntu 24.04 (glibc 2.39)
          - os: ubuntu-24.04
            target: x86_64
            manylinux: manylinux_2_39
            python: '3.13'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}
    
    - name: Build wheels
      uses: PyO3/maturin-action@v1
      with:
        target: ${{ matrix.target }}
        args: --release --out dist --find-interpreter --zig
        sccache: 'true'
        container: off
        manylinux: ${{ matrix.manylinux }}
      env:
        # Use stable ABI for forward compatibility
        PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'

    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}-${{ matrix.target }}-py${{ matrix.python }}
        path: dist

  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Build wheels
      uses: PyO3/maturin-action@v1
      with:
        target: aarch64
        args: --release --out dist --find-interpreter --zig
        sccache: 'true'
        container: off
        manylinux: manylinux_2_39
      env:
        # Use stable ABI for forward compatibility
        PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'

    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-linux-aarch64
        path: dist

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: ${{ matrix.target }}
    - name: Build wheels
      uses: PyO3/maturin-action@v1
      with:
        target: ${{ matrix.target }}
        args: --release --out dist --find-interpreter
        sccache: 'true'
      env:
        # Use stable ABI for forward compatibility
        PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'
    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-windows-${{ matrix.target }}
        path: dist

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Build wheels
      uses: PyO3/maturin-action@v1
      with:
        target: ${{ matrix.target }}
        args: --release --out dist --find-interpreter
        sccache: 'true'
      env:
        # Use stable ABI for forward compatibility
        PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'
    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-macos-${{ matrix.target }}
        path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build sdist
      uses: PyO3/maturin-action@v1
      with:
        command: sdist
        args: --out dist
    - name: Upload sdist
      uses: actions/upload-artifact@v4
      with:
        name: wheels-sdist
        path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [linux, linux-aarch64, windows, macos, sdist]
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: wheels-*
        merge-multiple: true
        path: dist
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@v1.12.4
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
